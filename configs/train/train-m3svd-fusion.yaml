# GaussianFusion Training Configuration
# Multi-modal temporal fusion with 2D Gaussian splatting

seed: 42

# Model
model:
  name: gaussian-fusion
  args:
    encoder_spec:
      name: edsr-baseline
      args:
        n_resblocks: 16
        n_feats: 64
        res_scale: 1
        scale: [1]
        no_upsampling: true
        n_colors: 64
        rgb_range: 1
        pretrained_path: null
    spynet_pretrained: sintel-final
    n_feats: 64
    freeze_spynet: true
    occ_threshold: 1.0

# Training dataset
train_dataset:
  name: m3svd-temporal-fusion
  args:
    root_path: ./data/M3SVD
    split: train
    vis_modality: visible_Enhance
    ir_modality: infrared_Enhance
    n_min: 2
    n_max: 16
    scale_min: 1.0
    scale_max: 1.0
    patch_size: 256
    augment: true

# Training hyperparameters
batch_size: 16
num_workers: 8
epochs: 200
lr: 1.0e-4
weight_decay: 0
save_every: 1
val_every: 1
# Loss weights
lambda_l1: 1.0
lambda_ssim: 0.5
lambda_max: 0.5
